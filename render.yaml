services:
  # ==========================================
  # 1. NODE.JS BACKEND (Web Service)
  # ==========================================
  - type: web
    name: ngo-lms-api
    env: node
    region: frankfurt # Choose a region close to your Neon Postgres database
    buildCommand: "cd backend && npm install"
    startCommand: "cd backend && npm start"
    envVars:
      - key: NODE_VERSION
        value: ~18.0.0
      - key: DATABASE_URL
        sync: false # Set to false so you can securely paste it in the Render UI
      - key: JWT_SECRET
        generateValue: true # Render will automatically generate a secure random token

  # ==========================================
  # 2. REACT FRONTEND (Static Site)
  # ==========================================
  - type: web
    name: ngo-lms-client
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: NODE_VERSION
        value: ~18.0.0
      - key: VITE_API_URL
        fromService:
          type: web
          name: ngo-lms-api
          envVarKey: RENDER_EXTERNAL_URL
        # This securely injects the live backend API URL into your Vite React build
```
